<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura y Concentrado de Lotes - Edición Continua</title>
    <style>
        :root {
            --verde-petroleo: #006068;
            --verde-oscuro: #004D54;
            --bg-color: #f4f7f6;
            --texto-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--texto-color);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid var(--verde-petroleo);
        }
        h1, h2 {
            color: #2c3e50;
            margin-top: 0;
        }
        .meta-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            background: #edf2f7;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr repeat(3, 1fr) auto;
            gap: 15px;
            align-items: end;
            margin-bottom: 25px;
            background: #f9fbfb;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
            color: #4a5568;
        }
        input, select {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 16px;
            background-color: white;
        }
        button {
            padding: 11px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-add {
            background-color: #2ecc71;
            color: white;
        }
        .btn-add:hover { background-color: #27ae60; }
        
        .btn-edit-mode {
            background-color: #d35400 !important;
            color: white;
        }
        
        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }
        .btn-clear:hover { background-color: #c0392b; }

        .btn-download {
            background-color: #3498db;
            color: white;
        }
        .btn-download:hover { background-color: #2980b9; }

        .btn-pdf {
            background-color: var(--verde-petroleo);
            color: white;
        }
        .btn-pdf:hover { background-color: var(--verde-oscuro); }

        .btn-upload-label {
            padding: 11px 20px;
            background-color: #f39c12;
            color: white;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            text-align: center;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-upload-label:hover { background-color: #d35400; }

        .actions-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .panel {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 15px;
            background: #fff;
        }
        textarea {
            width: 100%;
            height: 250px;
            box-sizing: border-box;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            background-color: #f8fafc;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #edf2f7;
            color: #2d3748;
        }
        tr:hover { background-color: #f8fafc; }
        .total-row {
            font-weight: bold;
            background-color: #f1f5f9;
        }
        .hidden {
            display: none;
        }
        .btn-tbl {
            padding: 4px 8px;
            font-size: 12px;
            margin-right: 2px;
        }
        .btn-tbl-edit { background-color: #f39c12; color: white; }
        .btn-tbl-edit:hover { background-color: #d35400; }
        .btn-tbl-del { background-color: #e74c3c; color: white; }
        .btn-tbl-del:hover { background-color: #c0392b; }

        /* --- ARQUITECTURA DE IMPRESIÓN PARA EL REPORTE PDF --- */
        #report-print-area {
            display: none;
        }

        @page {
            size: letter;
            margin: 15mm;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #report-print-area, #report-print-area * {
                visibility: visible;
            }
            #report-print-area {
                display: block;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white;
                color: #000;
                padding: 0;
                margin: 0;
                box-sizing: border-box;
            }
            .pdf-header {
                border-bottom: 3px solid #006068;
                padding-bottom: 8px;
                margin-bottom: 20px;
                width: 100%;
            }
            .pdf-logo {
                color: #006068;
                font-size: 24px;
                font-weight: bold;
                font-family: Arial, sans-serif;
                letter-spacing: 0.5px;
            }
            .pdf-meta-table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 20px;
            }
            .pdf-meta-table td {
                padding: 0;
                border: none;
                font-size: 14px;
                line-height: 1.6;
                vertical-align: top;
            }
            .pdf-section-title {
                color: #006068;
                font-family: sans-serif;
                margin-top: 25px;
                margin-bottom: 8px;
                font-size: 16px;
                border-bottom: 1px solid #cbd5e1;
                padding-bottom: 3px;
            }
            .pdf-table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 20px;
                table-layout: fixed;
            }
            .pdf-table th {
                border-bottom: 2px solid #006068;
                color: #006068;
                padding: 8px 4px;
                text-align: left;
                font-size: 12px;
                font-weight: bold;
                background-color: transparent;
            }
            .pdf-table td {
                padding: 8px 4px;
                border-bottom: 1px solid #eee;
                font-size: 12px;
            }
            
            /* Anchos para historial */
            .w-idx { width: 12%; }
            .w-lote { width: 28%; }
            .w-mat { width: 25%; }
            .w-cant { width: 15%; }
            .w-lbs { width: 20%; }

            .text-right {
                text-align: right;
            }
            .pdf-total-row {
                font-weight: bold;
                color: #006068;
            }
            .pdf-total-row td {
                border-top: 2px solid #006068;
                border-bottom: double #006068;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Captura de Lotes</h1>
    
    <div class="meta-inputs">
        <div class="form-group">
            <label for="numReg">Num de Reg:</label>
            <input type="text" id="numReg" placeholder="Ej. REG-2026-A">
        </div>
        <div class="form-group">
            <label for="bultos">Bultos Totales:</label>
            <input type="number" id="bultos" placeholder="Ej. 150" min="0">
        </div>
    </div>

    <div class="grid-inputs">
        <div class="form-group">
            <label for="material">Material</label>
            <select id="material">
                <option value="ACERO">Acero</option>
                <option value="ALUMINIO">Aluminio</option>
            </select>
        </div>
        <div class="form-group">
            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" placeholder="Ej. 10" min="1">
        </div>
        <div class="form-group">
            <label for="lbs">Libras (Lbs)</label>
            <input type="number" id="lbs" placeholder="Ej. 50.5" step="0.01" min="0">
        </div>
        <div class="form-group">
            <label for="lote">Número de Lote</label>
            <input type="text" id="lote" placeholder="Ej. L-1024">
        </div>
        <button class="btn-add" id="btnRegistrar" onclick="registrarDato()">Registrar</button>
    </div>

    <div class="actions-bar">
        <button class="btn-download" onclick="generarYDescargarTXT()">Descargar Reporte (TXT)</button>
        <button class="btn-pdf" onclick="generarPDFCliente()">Generar Reporte (PDF)</button>
        <label for="fileImport" class="btn-upload-label">Abrir / Cargar TXT</label>
        <input type="file" id="fileImport" class="hidden" accept=".txt" onchange="cargarArchivoTXT(event)">
        <button class="btn-clear" onclick="limpiarTodo()">Limpiar Todo</button>
    </div>

    <div class="sections">
        <div class="panel">
            <h2>Registro en Texto (Historial)</h2>
            <textarea id="txtRegistro" readonly placeholder="Aquí se acumularán tus registros línea por línea..."></textarea>
        </div>

        <div class="panel">
            <h2>Concentrado por Lote</h2>
            <div style="max-height: 250px; overflow-y: auto;">
                <table id="tablaConcentrado">
                    <thead>
                        <tr>
                            <th>Lote</th>
                            <th>Material</th>
                            <th>Total Cantidad</th>
                            <th>Total Lbs</th>
                            <th style="width: 110px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- CAPA DE IMPRESIÓN EXCLUSIVA CLIENTE -->
<div id="report-print-area"></div>

<script>
    let historialRegistros = [];
    let indiceEdicion = -1; 

    function registrarDato() {
        const inputMaterial = document.getElementById('material');
        const inputCantidad = document.getElementById('cantidad');
        const inputLbs = document.getElementById('lbs');
        const inputLote = document.getElementById('lote');
        const btnRegistrar = document.getElementById('btnRegistrar');

        const material = inputMaterial.value;
        const cantidad = parseInt(inputCantidad.value);
        const lbs = parseFloat(inputLbs.value);
        const lote = inputLote.value.trim().toUpperCase();

        if (!cantidad || !lbs || lote === "") {
            alert("Por favor, llena todos los campos correctamente.");
            return;
        }

        if (indiceEdicion === -1) {
            const nuevoRegistro = { material, cantidad, lbs, lote };
            historialRegistros.push(nuevoRegistro);
        } else {
            historialRegistros[indiceEdicion] = { material, cantidad, lbs, lote };
            indiceEdicion = -1;
            btnRegistrar.innerText = "Registrar";
            btnRegistrar.classList.remove("btn-edit-mode");
        }

        actualizarTextoReg();
        actualizarConcentrado();

        inputCantidad.value = '';
        inputLbs.value = '';
        inputLote.value = '';
        inputCantidad.focus();
    }

    function actualizarTextoReg() {
        const txtArea = document.getElementById('txtRegistro');
        txtArea.value = historialRegistros.map((r, i) => 
            `[Reg ${i + 1}] Lote: ${r.lote} | Mat: ${r.material} | Cantidad: ${r.cantidad} | Lbs: ${r.lbs.toFixed(2)}`
        ).join('\n');
        
        txtArea.scrollTop = txtArea.scrollHeight;
    }

    function actualizarConcentrado() {
        const tbody = document.querySelector('#tablaConcentrado tbody');
        tbody.innerHTML = ''; 

        let concentrado = {};
        let granTotalCantidad = 0;
        let granTotalLbs = 0;

        historialRegistros.forEach((r, index) => {
            if (!concentrado[r.lote]) {
                concentrado[r.lote] = { material: r.material, cantidad: 0, lbs: 0, indicesOriginales: [] };
            }
            concentrado[r.lote].cantidad += r.cantidad;
            concentrado[r.lote].lbs += r.lbs;
            concentrado[r.lote].indicesOriginales.push(index);
            
            granTotalCantidad += r.cantidad;
            granTotalLbs += r.lbs;
        });

        for (let lote in concentrado) {
            const fila = document.createElement('tr');
            let idx = concentrado[lote].indicesOriginales[0];

            fila.innerHTML = `
                <td><strong>${lote}</strong></td>
                <td><small>${concentrado[lote].material}</small></td>
                <td>${concentrado[lote].cantidad}</td>
                <td>${concentrado[lote].lbs.toFixed(2)} Lbs</td>
                <td>
                    <button class="btn-tbl btn-tbl-edit" onclick="prepararEdicion(${idx})" title="Editar lote">✏️</button>
                    <button class="btn-tbl btn-tbl-del" onclick="eliminarRegistro(${idx})" title="Eliminar lote">🗑️</button>
                </td>
            `;
            tbody.appendChild(fila);
        }

        if (historialRegistros.length > 0) {
            const filaTotal = document.createElement('tr');
            filaTotal.classList.add('total-row');
            filaTotal.innerHTML = `
                <td>TOTAL GENERAL</td>
                <td></td>
                <td>${granTotalCantidad}</td>
                <td>${granTotalLbs.toFixed(2)} Lbs</td>
                <td></td>
            `;
            tbody.appendChild(filaTotal);
        }
    }

    function prepararEdicion(index) {
        const registro = historialRegistros[index];
        if (!registro) return;

        document.getElementById('material').value = registro.material || 'ACERO';
        document.getElementById('cantidad').value = registro.cantidad;
        document.getElementById('lbs').value = registro.lbs;
        document.getElementById('lote').value = registro.lote;

        indiceEdicion = index;
        const btnRegistrar = document.getElementById('btnRegistrar');
        btnRegistrar.innerText = "Actualizar Registro";
        btnRegistrar.classList.add("btn-edit-mode");
        
        document.getElementById('cantidad').focus();
    }

    function eliminarRegistro(index) {
        if (confirm(`¿Estás seguro de que deseas eliminar este registro?`)) {
            historialRegistros.splice(index, 1);
            
            if(indiceEdicion === index) {
                indiceEdicion = -1;
                const btnRegistrar = document.getElementById('btnRegistrar');
                btnRegistrar.innerText = "Registrar";
                btnRegistrar.classList.remove("btn-edit-mode");
                document.getElementById('cantidad').value = '';
                document.getElementById('lbs').value = '';
                document.getElementById('lote').value = '';
            }

            actualizarTextoReg();
            actualizarConcentrado();
        }
    }

    function generarYDescargarTXT() {
        const numReg = document.getElementById('numReg').value.trim();
        const bultos = document.getElementById('bultos').value.trim();

        if (numReg === "" || bultos === "") {
            alert("Por favor, ingresa el 'Num de Reg' y los 'Bultos' antes de descargar el reporte.");
            return;
        }

        if (historialRegistros.length === 0) {
            alert("No hay registros capturados para guardar.");
            return;
        }

        let concentrado = {};
        let granTotalCantidad = 0;
        let granTotalLbs = 0;
        historialRegistros.forEach(r => {
            if (!concentrado[r.lote]) concentrado[r.lote] = { material: r.material, cantidad: 0, lbs: 0 };
            concentrado[r.lote].cantidad += r.cantidad;
            concentrado[r.lote].lbs += r.lbs;
            granTotalCantidad += r.cantidad;
            granTotalLbs += r.lbs;
        });

        let contenido = `=========================================\n`;
        contenido += `       REPORTE DE CAPTURA DE LOTES       \n`;
        contenido += `=========================================\n`;
        contenido += `Num de Reg: ${numReg}\n`;
        contenido += `Bultos: ${bultos}\n`;
        contenido += `Fecha de Exportación: ${new Date().toLocaleString()}\n`;
        contenido += `=========================================\n\n`;
        
        contenido += `--- HISTORIAL DE REGISTROS (DETALLE) ---\n`;
        historialRegistros.forEach((r, i) => {
            contenido += `[Reg ${i + 1}] Lote: ${r.lote.padEnd(10)} | Mat: ${r.material.padEnd(9)} | Cantidad: ${r.cantidad.toString().padEnd(5)} | Lbs: ${r.lbs.toFixed(2)}\n`;
        });
        
        contenido += `\n--- CONCENTRADO POR LOTE ---\n`;
        for (let lote in concentrado) {
            contenido += `Lote: ${lote.padEnd(12)} | Mat: ${concentrado[lote].material.padEnd(9)} | Cantidad: ${concentrado[lote].cantidad.toString().padEnd(6)} | Lbs: ${concentrado[lote].lbs.toFixed(2)} Lbs\n`;
        }
        contenido += `-----------------------------------------\n`;
        contenido += `TOTAL GENERAL     | Mat: --------- | Cantidad: ${granTotalCantidad.toString().padEnd(6)} | Lbs: ${granTotalLbs.toFixed(2)} Lbs\n`;
        contenido += `=========================================\n`;
        
        contenido += `\nDATA_JSON_BACKUP:${JSON.stringify({ numReg, bultos, registros: historialRegistros })}\n`;

        const blob = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
        const enlace = document.createElement('a');
        enlace.href = URL.createObjectURL(blob);
        
        let marcaTiempo = new Date().toLocaleTimeString('es-MX', {hour: '2-digit', minute:'2-digit'}).replace(':','h');
        enlace.download = `Reporte_${numReg}_Actualizado_${marcaTiempo}.txt`;
        enlace.click();
        URL.revokeObjectURL(enlace.href);
    }

    // --- FUNCIÓN DE IMPRESIÓN MODIFICADA CON HISTORIAL Y NUEVO TÍTULO ---
    function generarPDFCliente() {
        const numReg = document.getElementById('numReg').value.trim().toUpperCase();
        const bultos = document.getElementById('bultos').value.trim();
        const fechaHoy = new Date().toLocaleString('es-MX');

        if (numReg === "" || bultos === "") {
            alert("Por favor, ingresa el 'Num de Reg' y los 'Bultos' antes de generar el PDF.");
            return;
        }

        if (historialRegistros.length === 0) {
            alert("No hay registros capturados para estructurar el reporte.");
            return;
        }

        // 1. CONSTRUIR FILAS DEL HISTORIAL DE REGISTROS (DETALLE INDIVIDUAL)
        let filasHistorialHTML = "";
        historialRegistros.forEach((r, i) => {
            filasHistorialHTML += `
                <tr>
                    <td>Reg ${i + 1}</td>
                    <td><strong>${r.lote}</strong></td>
                    <td>${r.material}</td>
                    <td class="text-right">${r.cantidad}</td>
                    <td class="text-right">${r.lbs.toFixed(2)} Lbs</td>
                </tr>
            `;
        });

        // 2. CONSTRUIR FILAS DEL CONCENTRADO ACUMULADO POR LOTE
        let concentrado = {};
        let granTotalCantidad = 0;
        let granTotalLbs = 0;

        historialRegistros.forEach(r => {
            if (!concentrado[r.lote]) {
                concentrado[r.lote] = { material: r.material, cantidad: 0, lbs: 0 };
            }
            concentrado[r.lote].cantidad += r.cantidad;
            concentrado[r.lote].lbs += r.lbs;
            granTotalCantidad += r.cantidad;
            granTotalLbs += r.lbs;
        });

        let filasConcentradoHTML = "";
        for (let lote in concentrado) {
            filasConcentradoHTML += `
                <tr>
                    <td><strong>${lote}</strong></td>
                    <td>${concentrado[lote].material}</td>
                    <td class="text-right">${concentrado[lote].cantidad}</td>
                    <td class="text-right">${concentrado[lote].lbs.toFixed(2)} Lbs</td>
                </tr>
            `;
        }

        // 3. ENSAMBLADO DEL MAQUETADO DE IMPRESIÓN (NUEVO ENCABEZADO)
        let pdfHTML = `
            <div class="pdf-header">
                <div class="pdf-logo">SOPORTE DE REVISION NUM DE REG: ${numReg}</div>
            </div>
            
            <table class="pdf-meta-table">
                <tr>
                    <td style="text-align: left; width: 50%;">
                        <strong>NÚMERO DE REGISTRO:</strong> ${numReg}<br>
                        <strong>BULTOS TOTALES:</strong> ${bultos}
                    </td>
                    <td style="text-align: right; width: 50%;">
                        <strong>TIPO DE DOCUMENTO:</strong> Resumen e Historial de Captura<br>
                        <strong>FECHA DE EMISIÓN:</strong> ${fechaHoy}
                    </td>
                </tr>
            </table>

            <!-- SECCIÓN 1: HISTORIAL COMPLETO -->
            <div class="pdf-section-title">HISTORIAL DE REGISTROS (DETALLE)</div>
            <table class="pdf-table">
                <thead>
                    <tr>
                        <th class="w-idx">REG.</th>
                        <th class="w-lote">NÚMERO DE LOTE</th>
                        <th class="w-mat">MATERIAL</th>
                        <th class="w-cant text-right">CANTIDAD</th>
                        <th class="w-lbs text-right">LIBRAS (LBS)</th>
                    </tr>
                </thead>
                <tbody>
                    ${filasHistorialHTML}
                </tbody>
            </table>

            <!-- SECCIÓN 2: CONCENTRADO CON TOTALES -->
            <div class="pdf-section-title">CONCENTRADO TOTALIZADO POR LOTE</div>
            <table class="pdf-table">
                <thead>
                    <tr>
                        <th>NÚMERO DE LOTE</th>
                        <th>MATERIAL</th>
                        <th class="text-right">TOTAL CANTIDAD</th>
                        <th class="text-right">TOTAL LIBRAS (LBS)</th>
                    </tr>
                </thead>
                <tbody>
                    ${filasConcentradoHTML}
                    <tr class="pdf-total-row">
                        <td>TOTAL GENERAL</td>
                        <td>---------</td>
                        <td class="text-right">${granTotalCantidad}</td>
                        <td class="text-right">${granTotalLbs.toFixed(2)} Lbs</td>
                    </tr>
                </tbody>
            </table>
        `;

        // Renderizado en capa limpia y ejecución de la ventana de guardado
        document.getElementById('report-print-area').innerHTML = pdfHTML;
        window.print();
    }

    function cargarArchivoTXT(evento) {
        const archivo = evento.target.files[0];
        if (!archivo) return;

        const lector = new FileReader();
        lector.onload = function(e) {
            const contenido = e.target.result;
            const marcador = "DATA_JSON_BACKUP:";
            const posicion = contenido.indexOf(marcador);

            if (posicion === -1) {
                alert("El archivo TXT seleccionado no contiene el formato de respaldo compatible.");
                return;
            }

            try {
                const jsonString = contenido.substring(posicion + marcador.length).trim();
                const datosRestaurados = JSON.parse(jsonString);

                historialRegistros = [];
                indiceEdicion = -1;
                const btnRegistrar = document.getElementById('btnRegistrar');
                btnRegistrar.innerText = "Registrar";
                btnRegistrar.classList.remove("btn-edit-mode");

                document.getElementById('numReg').value = datosRestaurados.numReg || '';
                document.getElementById('bultos').value = datosRestaurados.bultos || '';
                historialRegistros = datosRestaurados.registros || [];

                actualizarTextoReg();
                actualizarConcentrado();
                
                alert("¡Reporte cargado correctamente! Los lotes viejos se restauraron. Ya puedes agregar lo faltante o modificarlos.");
            } catch (error) {
                alert("Ocurrió un error al intentar procesar el archivo.");
                console.error(error);
            }
        };
        lector.readAsText(archivo);
        evento.target.value = '';
    }

    function limpiarTodo() {
        if (confirm("¿Estás seguro de que deseas borrar todos los registros y campos actuales?")) {
            historialRegistros = [];
            indiceEdicion = -1;
            const btnRegistrar = document.getElementById('btnRegistrar');
            btnRegistrar.innerText = "Registrar";
            btnRegistrar.classList.remove("btn-edit-mode");
            
            document.getElementById('numReg').value = '';
            document.getElementById('bultos').value = '';
            document.getElementById('material').value = 'ACERO';
            document.getElementById('cantidad').value = '';
            document.getElementById('lbs').value = '';
            document.getElementById('lote').value = '';
            document.getElementById('txtRegistro').value = '';
            document.querySelector('#tablaConcentrado tbody').innerHTML = '';
        }
    }
</script>
