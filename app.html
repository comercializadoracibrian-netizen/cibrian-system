<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisiones LRM</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 6px solid #004d4d; }
        h2 { color: #004d4d; border-bottom: 2px solid #004d4d; padding-bottom: 10px; text-align: center; font-size: 22px; margin-top: 0; }
        label { font-weight: bold; color: #333; display: block; margin-top: 10px; }
        .form-control { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .btn-verde { background-color: #004d4d; color: white; width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        .btn-verde:hover { background-color: #003333; }
    </style>
</head>
<body>
    <div class='container'>
        <h2>REVISIONES LRM</h2>
        <!-- Apunta directamente al puerto local de tu máquina de la bodega -->
        <form action='http://localhost:5007/procesar-registro' method='post' enctype='multipart/form-data'>
            <label>CLIENTE:</label>
            <select name='cliente' class='form-control'>
                <option>CAPSA</option>
                <option>LEAR</option>
            </select>
            
            <label>NÚMERO DE REGISTRO:</label>
            <input type='text' name='nombreRegistro' class='form-control' required placeholder="Ej. 12345">
            
            <label>¿TIENE PACKING LIST?:</label>
            <select name='tienePacking' class='form-control'>
                <option>SÍ</option>
                <option selected>NO</option>
            </select>
            
            <label>SELECCIONAR FOTOS:</label>
            <input type='file' name='fotos' class='form-control' multiple accept='image/*' required>
            
            <button type='submit' class='btn-verde'>GUARDAR Y GENERAR PDF</button>
        </form>
    </div>
</body>
</html>
